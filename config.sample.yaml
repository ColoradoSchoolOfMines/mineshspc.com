# ===== Database Settings =====
database:
  # The database type. Only "sqlite3" is supported.
  type: sqlite3
  # The database URI.
  #   SQLite: A raw file path is supported, but `file:<path>?_txlock=immediate` is recommended.
  #           https://github.com/mattn/go-sqlite3#connection-string#
  uri: mineshspc.db?_txlock=immediate
  # Maximum number of connections. Mostly relevant for Postgres.
  max_open_conns: 20
  max_idle_conns: 2
  # Maximum connection idle time and lifetime before they're closed. Disabled if null.
  # Parsed with https://pkg.go.dev/time#ParseDuration
  max_conn_idle_time: null
  max_conn_lifetime: null

# This will disable sending emails, and instead print the value of the email to
# stdout.
dev_mode: false

sendgrid_api_key: SENDGRID_API_KEY

healthcheck_url: null

# This will be shown in the footer right after the link to the source code.
hosted_by_html: |
  Hosting provided by YOUR COMPANY HERE.

# Use the following domain for email links.
domain: http://localhost:8090

# A file that contains the HMAC secret key for signing the JWT tokens.
jwt_secret_key_file: secret_key_file

# The actual text of the secret key.
jwt_secret_key: YOUR_VERY_SECURE_KEY

recaptcha:
  site_key: RECAPTCHA_SITE_KEY
  secret_key: RECAPTCHA_SECRET_KEY

homepage:
  # Text for the <h2> in the hero. Examples by phase:
  #   Phase 1 (post-comp): "Thanks for a great 2025 competition!"
  #   Phase 2-4:           "The 2026 competition will be held on 25 April."
  h2_text: "The 2026 competition will be held on 25 April."

  # Hero paragraph text (HTML allowed). Omit or leave empty to hide the paragraph.
  #   Phase 1: "Registration for this year's competition is closed."
  #   Phase 2/3: "Registration is now open for the Spring 2026 competition."
  #   Phase 4: (empty)
  hero_text: ""

  # Deadline date string shown when registration_enabled is true.
  registration_deadline: "10 April"

  # When true, shows "Late Registration Deadline" badge (danger) instead of "Registration Deadline" (warning).
  late_registration: false

  # When true (and open_division_url is empty), shows "will be available closer to the competition."
  open_division_coming_soon: false

  # When non-empty, shows the Open Division / Kattis registration link block.
  open_division_url: ""

# ===== Logger Settings =====
# See https://github.com/tulir/zeroconfig for details.
logging:
  min_level: debug
  writers:
    - type: stdout
      format: pretty-colored
